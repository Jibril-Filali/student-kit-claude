<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="270" rx="2" fill="url(#accent)"/>

  <!-- Terminal window -->
  <rect x="640" y="140" width="480" height="300" rx="12" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1.5"/>
  <rect x="640" y="140" width="480" height="44" rx="12" fill="#1e1e30"/>
  <rect x="640" y="168" width="480" height="16" fill="#1e1e30"/>
  <circle cx="672" cy="162" r="6" fill="#ff5f57"/>
  <circle cx="694" cy="162" r="6" fill="#febc2e"/>
  <circle cx="716" cy="162" r="6" fill="#28c840"/>
  <text x="764" y="166" font-family="monospace" font-size="12" fill="#555577">bash · ~</text>

  <!-- Terminal content -->
  <text x="664" y="218" font-family="monospace" font-size="13" fill="#7c3aed">~</text>
  <text x="676" y="218" font-family="monospace" font-size="13" fill="#e2e2e8"> npm install -g @anthropic-ai/claude-code</text>
  <text x="664" y="244" font-family="monospace" font-size="13" fill="#28c840">✓</text>
  <text x="676" y="244" font-family="monospace" font-size="13" fill="#555577"> Claude Code installé</text>
  <text x="664" y="270" font-family="monospace" font-size="13" fill="#7c3aed">~</text>
  <text x="676" y="270" font-family="monospace" font-size="13" fill="#e2e2e8"> claude</text>
  <text x="664" y="296" font-family="monospace" font-size="13" fill="#28c840">✓</text>
  <text x="676" y="296" font-family="monospace" font-size="13" fill="#555577"> Prêt. Claude Code actif.</text>
  <text x="664" y="322" font-family="monospace" font-size="13" fill="#7c3aed">~</text>
  <rect x="676" y="308" width="8" height="18" rx="1" fill="#7c3aed" opacity="0.8"/>

  <!-- Main text -->
  <text x="108" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#7c3aed" font-weight="600" letter-spacing="2">SETUPCLAUDE</text>
  <text x="104" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="58" fill="#e2e2e8" font-weight="800">Installe</text>
  <text x="104" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800">
    <tspan fill="url(#accent)">Claude Code</tspan>
  </text>
  <text x="104" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="58" fill="#e2e2e8" font-weight="800">en 5 minutes.</text>

  <!-- Subtitle -->
  <text x="108" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#888899">Guide complet · Java · MySQL · MongoDB · 2026</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0a0a10"/>
  <text x="108" y="614" font-family="monospace" font-size="13" fill="#444466">setupclaude.fr</text>
  <text x="1092" y="614" font-family="monospace" font-size="13" fill="#444466" text-anchor="end">v1.2</text>
